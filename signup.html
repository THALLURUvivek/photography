<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Lensflare Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <img src="images/OIP.webp" alt="Lensflare Studio" class="auth-logo-img">
                </a>
                <h4>Create Your Account</h4>
                <p>Join our photography community and start booking sessions.</p>
            </div>

            <div class="social-login">
                <a href="error.html" class="social-btn google"><i class="bi bi-google"></i> Google</a>
                <a href="error.html" class="social-btn facebook"><i class="bi bi-facebook"></i> Facebook</a>
                <a href="error.html" class="social-btn apple"><i class="bi bi-apple"></i> Apple</a>
            </div>

            <div class="divider">or sign up with email</div>

            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <input type="text" class="form-control-auth" id="signupName" placeholder=" " required>
                    <label class="form-floating-label" for="signupName">Full Name</label>
                    <div class="error-msg">Name is required</div>
                </div>

                <div class="form-group">
                    <input type="email" class="form-control-auth" id="signupEmail" placeholder=" " required>
                    <label class="form-floating-label" for="signupEmail">Email Address</label>
                    <div class="error-msg">Please enter a valid email</div>
                </div>

                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" name="signupRole" id="roleCustomer" value="customer" checked>
                        <label for="roleCustomer"><i class="bi bi-person"></i><span>Customer</span></label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="signupRole" id="rolePhotographer" value="photographer">
                        <label for="rolePhotographer"><i class="bi bi-camera"></i><span>Photographer</span></label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="signupRole" id="roleAdmin" value="admin">
                        <label for="roleAdmin"><i class="bi bi-shield"></i><span>Admin</span></label>
                    </div>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control-auth" id="signupPassword" placeholder=" " required>
                    <label class="form-floating-label" for="signupPassword">Password</label>
                    <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
                    <div class="password-strength">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                    <div class="password-strength-text"></div>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control-auth" id="signupConfirm" placeholder=" " required>
                    <label class="form-floating-label" for="signupConfirm">Confirm Password</label>
                    <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
                    <div class="error-msg">Passwords do not match</div>
                </div>

                <div class="form-check-custom">
                    <input type="checkbox" id="termsCheck">
                    <label for="termsCheck">I agree to the <a href="#">Terms of Service</a> & <a href="#">Privacy Policy</a></label>
                </div>

                <button type="submit" class="btn-auth">
                    <span class="btn-text">Create Account</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="signin.html">Sign In</a></p>
                <a href="index.html" class="back-home"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
