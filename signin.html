<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Lensflare Studio</title>
  
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">

            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <img src="images/OIP.webp" alt="Lensflare Studio" class="auth-logo-img">
                </a>
                <h4>Welcome Back</h4>
                <p>Sign in to access your account and manage your sessions.</p>
            </div>

            <!-- Form -->
            <form class="auth-form" id="signinForm">
                <div class="form-group">
                    <input type="email" class="form-control-auth" id="signinEmail" placeholder=" " required>
                    <label class="form-floating-label" for="signinEmail">Email Address</label>
                    <div class="error-msg">Please enter a valid email</div>
                </div>

                <div class="form-group">
                    <input type="password" class="form-control-auth" id="signinPassword" placeholder=" " required>
                    <label class="form-floating-label" for="signinPassword">Password</label>
                    <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
                    <div class="error-msg">Password is required</div>
                </div>

                <div class="role-selector">
                    <div class="role-option">
                        <input type="radio" name="signinRole" id="signinRoleCustomer" value="customer" checked>
                        <label for="signinRoleCustomer"><i class="bi bi-person"></i><span>Customer</span></label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="signinRole" id="signinRolePhotographer" value="photographer">
                        <label for="signinRolePhotographer"><i class="bi bi-camera"></i><span>Photographer</span></label>
                    </div>
                    <div class="role-option">
                        <input type="radio" name="signinRole" id="signinRoleAdmin" value="admin">
                        <label for="signinRoleAdmin"><i class="bi bi-shield"></i><span>Admin</span></label>
                    </div>
                </div>

                <div class="form-check-custom">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe">Remember me</label>
                    <a href="error.html" style="margin-left:auto;color:var(--primary);text-decoration:none;font-size:0.85rem;">Forgot password?</a>
                </div>

                <button type="submit" class="btn-auth">
                    <span class="btn-text">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-login">
                <a href="error.html" class="social-btn google"><i class="bi bi-google"></i> Google</a>
                <a href="error.html" class="social-btn facebook"><i class="bi bi-facebook"></i> Facebook</a>
                <a href="error.html" class="social-btn apple"><i class="bi bi-apple"></i> Apple</a>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create one</a></p>
                <a href="index.html" class="back-home"><i class="bi bi-arrow-left"></i> Back to Home</a>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
